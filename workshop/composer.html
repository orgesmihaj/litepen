<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

	<title>Litepen</title>
</head>
<body>

<section class="playground">
	<div class="playground__composer"></div>

	<code class="playground__code" id="playground-code"></code>
</section>

<script type="module">
	import Composer from "@/composer";

	import '../assets/sass/semantic.scss';
	import '../assets/sass/composer.scss';

	new Composer({
		format: 'json',
		holder: document.querySelector('.playground__composer'),
		placeholder: 'Write something cool...',
		onUpdate: (state) => {
			document.querySelector('#playground-code').innerHTML = JSON.stringify(state, null, 2);
		}
	});
</script>
</body>
</html>
